# Namespace for Hyperlight device plugin
apiVersion: v1
kind: Namespace
metadata:
  name: hyperlight-system
  labels:
    app.kubernetes.io/name: hyperlight-system
    app.kubernetes.io/part-of: hyperlight

---
# ServiceAccount for device plugin
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hyperlight-device-plugin
  namespace: hyperlight-system
  labels:
    app.kubernetes.io/name: hyperlight-device-plugin
    app.kubernetes.io/part-of: hyperlight

---
# DaemonSet for Hyperlight Device Plugin
# Exposes hypervisor devices (/dev/kvm) to pods via CDI.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: hyperlight-device-plugin
  namespace: hyperlight-system
  labels:
    app.kubernetes.io/name: hyperlight-device-plugin
    app.kubernetes.io/part-of: hyperlight
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hyperlight-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hyperlight-device-plugin
        app.kubernetes.io/part-of: hyperlight
    spec:
      serviceAccountName: hyperlight-device-plugin
      nodeSelector:
        hyperlight.dev/enabled: "true"
      priorityClassName: system-node-critical
      containers:
        - name: device-plugin
          image: ${IMAGE}
          imagePullPolicy: Always
          env:
            - name: DEVICE_COUNT
              value: "${DEVICE_COUNT}"
            - name: DEVICE_UID
              value: "${DEVICE_UID}"
            - name: DEVICE_GID
              value: "${DEVICE_GID}"
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsUser: 0
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: cdi
              mountPath: /var/run/cdi
            - name: dev
              mountPath: /dev
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            exec:
              command:
                - test
                - -S
                - /var/lib/kubelet/device-plugins/hyperlight.sock
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
        - name: cdi
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
        - name: dev
          hostPath:
            path: /dev
            type: Directory
      terminationGracePeriodSeconds: 30
